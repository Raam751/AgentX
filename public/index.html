<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AI Browser Automation Agent — Watch an AI autonomously control a web browser using vision-based understanding and self-correction">
  <title>AI Browser Agent — Real-Time Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Top Bar -->
  <header id="top-bar">
    <div class="top-bar-left">
      <div class="logo">
        <span class="logo-icon">🤖</span>
        <span class="logo-text">AI Browser Agent</span>
        <span class="logo-badge">v2</span>
      </div>
    </div>
    <div class="top-bar-right">
      <div id="status-indicator" class="status-indicator">
        <span class="status-dot idle"></span>
        <span class="status-text">Idle</span>
      </div>
      <button id="btn-stop" class="btn btn-stop" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
        Stop
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main id="main-content">
    <!-- Left: Browser View -->
    <section id="browser-panel" class="panel">
      <div class="panel-header">
        <h2>Live Browser View</h2>
        <div class="view-toggle">
          <button id="btn-clean" class="toggle-btn active" data-view="clean">Clean</button>
          <button id="btn-vision" class="toggle-btn" data-view="vision">AI Vision</button>
        </div>
      </div>
      <div id="screenshot-container" class="screenshot-container">
        <div id="empty-state" class="empty-state">
          <div class="empty-icon">🌐</div>
          <h3>Ready to automate</h3>
          <p>Enter a task below and press Start to watch the AI agent control a browser in real-time.</p>
          <div class="empty-hints">
            <span class="hint-tag">Vision-based</span>
            <span class="hint-tag">Self-correcting</span>
            <span class="hint-tag">Real-time</span>
          </div>
        </div>
        <img id="screenshot-img" class="screenshot-img" alt="Browser screenshot" style="display:none;">
      </div>
    </section>

    <!-- Right: Action Log -->
    <section id="log-panel" class="panel">
      <div class="panel-header">
        <h2>Action Log</h2>
        <button id="btn-clear-log" class="btn-icon" title="Clear log">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </button>
      </div>
      <div id="log-container" class="log-container">
        <div class="log-empty">
          <p>Actions will appear here as the agent works...</p>
        </div>
      </div>
    </section>
  </main>

  <!-- Bottom Bar -->
  <footer id="bottom-bar">
    <div class="task-input-group">
      <div class="input-wrapper">
        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        <input
          id="task-input"
          type="text"
          placeholder="Describe a task... e.g., 'Go to google.com and search for AI news'"
          value="Navigate to https://ui.shadcn.com/docs/forms/react-hook-form and fill out the Bug Report form with Name: John Doe and Description: This is an automated description filled by an AI agent"
        >
      </div>
      <button id="btn-start" class="btn btn-start">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Start
      </button>
    </div>
    <div id="step-counter" class="step-counter">
      <span id="step-text">Ready</span>
    </div>
  </footer>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
